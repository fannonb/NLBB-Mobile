name: Mobile Preview APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/mobile-preview-build.yml
      - App.tsx
      - app.config.js
      - babel.config.js
      - eas.json
      - google-services.json
      - index.ts
      - metro.config.js
      - package.json
      - package-lock.json
      - src/**
      - tsconfig.json
      - assets/**

concurrency:
  group: mobile-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check required mobile build secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret. Add the full google-services.json contents in the repository Actions secrets before using this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Restore Android Firebase config
        shell: bash
        run: |
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF
          mkdir -p android/app
          cp google-services.json android/app/google-services.json

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Ensure Gradle wrapper is executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload preview APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nlbb-preview-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
