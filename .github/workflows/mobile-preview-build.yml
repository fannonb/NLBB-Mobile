name: Mobile Preview APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - App.tsx
      - app.config.js
      - babel.config.js
      - eas.json
      - index.ts
      - metro.config.js
      - package.json
      - package-lock.json
      - tsconfig.json
      - assets/**
      - src/**

concurrency:
  group: mobile-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in the repository Actions secrets before using this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Queue preview APK build
        run: eas build --platform android --profile preview --non-interactive --no-wait
