name: Mobile Preview APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app.config.js
      - babel.config.js
      - eas.json
      - google-services.json
      - index.ts
      - metro.config.js
      - package.json
      - package-lock.json
      - tsconfig.json
      - assets/**

concurrency:
  group: mobile-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check required mobile build secrets
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in the repository Actions secrets before using this workflow."
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "Missing GOOGLE_SERVICES_JSON secret. Add the full google-services.json contents in the repository Actions secrets before using this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Restore Android Firebase config
        shell: bash
        run: |
          cat <<'EOF' > google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Queue preview APK build
        run: eas build --platform android --profile preview --non-interactive --wait
