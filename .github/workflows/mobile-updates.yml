name: Mobile OTA Updates

on:
  push:
    branches:
      - main
    paths:
      - App.tsx
      - index.ts
      - assets/**
      - src/**
  workflow_dispatch:
    inputs:
      channel:
        description: EAS Update channel to publish
        required: false
        default: all
        type: choice
        options:
          - all
          - preview
          - production

concurrency:
  group: mobile-updates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || inputs.channel == 'all' || inputs.channel == 'preview'
    env:
      EXPO_PUBLIC_API_BASE_URL: https://api.nlbb.co.ke/api
      EXPO_PUBLIC_APP_ENV: production
      EXPO_PUBLIC_ENABLE_DEMO_MODE: 'false'
      EXPO_PUBLIC_ALLOW_SEEDED_IDENTITIES: 'false'
    steps:
      - name: Check required Expo secret
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in the repository Actions secrets before using this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Publish preview update
        run: eas update --channel preview --platform android --non-interactive --message "${{ github.event.head_commit.message || github.sha }}"

  publish-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || inputs.channel == 'all' || inputs.channel == 'production'
    env:
      EXPO_PUBLIC_API_BASE_URL: https://api.nlbb.co.ke/api
      EXPO_PUBLIC_APP_ENV: production
      EXPO_PUBLIC_ENABLE_DEMO_MODE: 'false'
      EXPO_PUBLIC_ALLOW_SEEDED_IDENTITIES: 'false'
    steps:
      - name: Check required Expo secret
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Missing EXPO_TOKEN secret. Add it in the repository Actions secrets before using this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Publish production update
        run: eas update --channel production --platform android --non-interactive --message "${{ github.event.head_commit.message || github.sha }}"
